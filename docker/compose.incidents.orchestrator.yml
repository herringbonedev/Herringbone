services:
  incidents-orchestrator:
    container_name: incidents-orchestrator
    image: quay.io/herringbone/incidents-orchestrator:ddea6140@sha256:e7bb136b3db1f386e99b76023b23c724ec1d7044d4c43296f0797a07ef2a330a
    restart: unless-stopped
    networks:
      - herringbone
    expose:
      - "7013"
    environment:
      CORRELATOR_URL: "http://incidents-correlator:7012/incidents/correlator/correlate"
      INCIDENTSET_API: "http://incidents-incidentset:7011/incidents/incidentset"
      # Context
      HERRINGBONE_SERVICE: incidents-orchestrator
      HERRINGBONE_UNIT: incidents
      HERRINGBONE_ELEMENT: orchestrator
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    secrets:
      - service_token
      - service_jwt_public_key
      - jwt_secret
secrets:
  service_token:
    file: ./secrets/runtime/incidents_orchestrator_service_token
  service_jwt_public_key:
    file: ./secrets/runtime/service_jwt_public_key
  jwt_secret:
    file: ./secrets/runtime/jwt_secret
networks:
  herringbone:
    external: true
    name: herringbone_net

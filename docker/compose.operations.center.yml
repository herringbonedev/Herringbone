services:
  operations-center:
    image: quay.io/herringbone/operations-center:sha-7fd30643@sha256:e8ec31cfd63471be8970628f42d3f5d616e23bc92d3c67ab10abfae7dedeba6c
    container_name: operations-center
    restart: unless-stopped

    profiles: ["ops"]

    networks:
      - herringbone

    expose:
      - "8080"

    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/nginx/tmp
      - /run
    security_opt:
      - no-new-privileges:true

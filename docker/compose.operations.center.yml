services:
  operations-center:
    image: quay.io/herringbone/operations-center:sha-fe5c5af8@sha256:a440ec30621492fc8ae246ac323cc6cf23a084194e49b65faf83aa428627bfd6
    container_name: operations-center
    restart: unless-stopped

    profiles: ["ops"]

    networks:
      - herringbone

    expose:
      - "8080"

    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/nginx/tmp
      - /run
    security_opt:
      - no-new-privileges:true

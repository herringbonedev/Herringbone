services:
  operations-center:
    image: quay.io/herringbone/operations-center:sha-39e42d17@sha256:1c20df86114255c5ba365c886c6b82320054d55410f499b57eacf3682814815e
    container_name: operations-center
    restart: unless-stopped

    profiles: ["ops"]

    networks:
      - herringbone

    expose:
      - "8080"

    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/nginx/tmp
      - /run
    security_opt:
      - no-new-privileges:true

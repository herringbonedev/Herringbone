services:
  operations-center:
    image: quay.io/herringbone/operations-center:sha-e479af44@sha256:d14c38be66b929123204bf009702267c145e474f406ba0b70816f65bb853b6f0
    container_name: operations-center
    restart: unless-stopped

    profiles: ["ops"]

    networks:
      - herringbone

    expose:
      - "8080"

    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/nginx/tmp
      - /run
    security_opt:
      - no-new-privileges:true
